<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LullwaveFM — Authorization</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c0f;
      --surface: #111418;
      --border: rgba(255,255,255,0.06);
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #e8e4dc;
      --muted: rgba(232,228,220,0.45);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(80,120,100,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: float var(--dur) var(--delay) ease-in-out infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.1; }
      100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
    }

    /* Center layout */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* Icon */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2.5rem;
      background: var(--gold-dim);
      animation: pulse 3s ease-in-out infinite;
      position: relative;
    }
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.15);
      animation: pulse 3s ease-in-out infinite reverse;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.8; }
    }
    .icon-wrap svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--gold);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Text */
    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
      animation: fadeUp 0.8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check {
      width: 44px;
      height: 44px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(80,180,120,0.12);
      border: 1px solid rgba(80,180,120,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check svg {
      width: 20px;
      height: 20px;
      stroke: #6ec99a;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: draw 0.6s 0.4s ease forwards;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .card p {
      font-size: 0.78rem;
      line-height: 1.8;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 1.5rem auto;
    }

    .footer-note {
      font-size: 0.7rem;
      color: rgba(232,228,220,0.2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2.5rem;
    }
  </style>
</head>
<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="page">
    <!-- Logo -->
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </div>

    <div class="wordmark">LullwaveFM</div>

    <!-- Card -->
    <div class="card">
      <div class="check">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Authorization Complete</h1>
      <div class="divider"></div>
      <p>Your account has been successfully connected.<br>You may close this tab and return to the application.</p>
    </div>

    <div class="footer-note">Ambient Music · Healing Frequencies · 432Hz</div>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        --dur: ${6 + Math.random() * 10}s;
        --delay: ${Math.random() * 8}s;
        --drift: ${(Math.random() - 0.5) * 80}px;
        width: ${Math.random() > 0.7 ? 2 : 1}px;
        height: ${Math.random() > 0.7 ? 2 : 1}px;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
